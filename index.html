    <script>
      // GitHub Pages SPA: restore the original path from the ?p= redirect param
      // set by 404.html before React Router mounts.
      (function () {
        var search = window.location.search;
        if (search.indexOf('?p=') === 0 || search.indexOf('&p=') !== -1) {
          var p = search
            .slice(1)
            .split('&')
            .reduce(function (a, b) {
              var c = b.split('=');
              a[c[0]] = c.slice(1).join('=').replace(/~and~/g, '&');
              return a;
            }, {});
          var path =
            (p.p || '') +
            (p.q ? '?' + p.q : '') +
            (window.location.hash || '');
          if (path) {
            window.history.replaceState(null, null, '/' + path);
          }
        }
      })();
    </script>
