<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Base title/description overridden per-page by react-helmet-async -->
    <title>Monogamy — Premium Legal Services On Demand</title>
    <meta name="description" content="Access top-rated attorneys across every practice area for $19.99/month. Vetted lawyers in South Africa, Nigeria, and Kenya available within 2 hours." />
    <meta name="author" content="Monogamy" />
    <meta name="language" content="en-ZA" />
    <meta name="geo.region" content="ZA" />
    <meta name="geo.placename" content="South Africa" />
    <meta name="content-language" content="en-ZA" />
    <link rel="canonical" href="https://monogamy.legal" />

    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://storage.googleapis.com/gpt-engineer-file-uploads/iy019M6SqjMXyibDc8dgs2v9PSx1/uploads/1770788009856-MONOGAMY_LOGO_PACK_AND_MEDIA_ASSETS.png">

    <!-- Default Open Graph (overridden per-page by react-helmet-async) -->
    <meta property="og:site_name" content="Monogamy" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Monogamy — Premium Legal Services On Demand" />
    <meta property="og:description" content="Access top-rated attorneys across every practice area for $19.99/month. Vetted lawyers in South Africa, Nigeria, and Kenya." />
    <meta property="og:url" content="https://monogamy.legal" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/iy019M6SqjMXyibDc8dgs2v9PSx1/social-images/social-1770788034077-GRAVITAS_PORTFOLIO_(Hi-Red_Banners).jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Default Twitter Card (overridden per-page by react-helmet-async) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@monogamy_law" />
    <meta name="twitter:title" content="Monogamy — Premium Legal Services On Demand" />
    <meta name="twitter:description" content="Access top-rated attorneys across every practice area for $19.99/month. Vetted lawyers in South Africa, Nigeria, and Kenya." />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/iy019M6SqjMXyibDc8dgs2v9PSx1/social-images/social-1770788034077-GRAVITAS_PORTFOLIO_(Hi-Red_Banners).jpeg" />

    <!-- Global JSON-LD: Organization + WebSite (supplemented per-page by react-helmet-async) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://monogamy.legal/#organization",
          "name": "Monogamy",
          "url": "https://monogamy.legal",
          "logo": "https://monogamy.legal/monogamyappicon.png",
          "description": "Monogamy is a premium legal services platform connecting individuals and businesses with vetted attorneys across Africa for a flat monthly subscription.",
          "sameAs": [
            "https://facebook.com/monogamy.legal",
            "https://linkedin.com/company/monogamylegal",
            "https://whatsapp.com/channel/0029Vb7wLlMI7BeLb4viJx37"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://monogamy.legal/#website",
          "name": "Monogamy",
          "url": "https://monogamy.legal",
          "publisher": { "@id": "https://monogamy.legal/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://monogamy.legal/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- SPA redirect handling for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
